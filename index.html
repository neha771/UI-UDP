<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UI UDP — Vehicle Interface Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #06070e;
    --surface: #0c0e1e;
    --surface2: #12152a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text1: rgba(255,255,255,0.92);
    --text2: rgba(255,255,255,0.55);
    --text3: rgba(255,255,255,0.28);
    --blue: #4080ff;
    --green: #1aed8a;
    --amber: #f5a623;
    --red: #ff4545;
    --purple: #9d6fff;
    --pink: #ff6b8a;
    --gold: #ffd166;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text1); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  #root { height: 100%; display: flex; flex-direction: column; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  @keyframes ripple { 0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)} 50%{opacity:0;transform:translate(-50%,-50%) scale(2.2)} }
  @keyframes pulseScale { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.75} }
  @keyframes fadeInOut { 0%{opacity:0;transform:scale(0.8)} 20%{opacity:1;transform:scale(1)} 80%{opacity:1} 100%{opacity:0} }
  @keyframes flashRed { 0%,100%{opacity:0.08} 50%{opacity:0.18} }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

  .feature-item { transition: background 0.15s, border-color 0.15s; cursor: pointer; }
  .feature-item:hover { background: rgba(255,255,255,0.04) !important; }
  .feature-item.active { background: rgba(64,128,255,0.1) !important; border-color: rgba(64,128,255,0.3) !important; }
  .screen-dot { transition: all 0.2s; cursor: pointer; }
  .screen-dot:hover { transform: scale(1.3); }
  .nav-btn { transition: background 0.15s, opacity 0.15s; cursor: pointer; }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1) !important; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .device-label { animation: fadeIn 0.3s ease; }
  .screen-area { animation: slideUp 0.3s ease; }

  /* ══ ENHANCED VISUAL SYSTEM ══ */
  :root {
    --bg: #04050d;
    --surface: #080a17;
    --surface2: #0d1022;
    --border: rgba(255,255,255,0.065);
    --border2: rgba(255,255,255,0.13);
    --text1: rgba(255,255,255,0.94);
    --text2: rgba(255,255,255,0.58);
    --text3: rgba(255,255,255,0.28);
    --blue: #4f8fff;
    --green: #1aed8a;
    --amber: #f5a62a;
    --red: #ff4f4f;
    --purple: #9d6fff;
    --pink: #ff6b8a;
    --gold: #ffd166;
  }
  html, body { 
    height: 100%; background: var(--bg); color: var(--text1); 
    font-family: 'DM Sans', sans-serif; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Improved HUD strip look */
  .hud-strip-enhanced {
    background: rgba(4,5,13,0.93) !important;
    backdrop-filter: blur(20px) !important;
    box-shadow: 0 -1px 0 rgba(255,255,255,0.06), 0 -8px 32px rgba(0,0,0,0.6) !important;
  }

  /* Richer card surfaces */
  .card-enhanced {
    background: rgba(8,10,22,0.94) !important;
    backdrop-filter: blur(24px) !important;
  }

  /* Screen devices */
  .device-frame {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 24px 64px rgba(0,0,0,0.7) !important;
  }

  /* Glowing alert borders */
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 0 0 currentColor; }
    50% { box-shadow: 0 0 20px 2px currentColor; }
  }
  @keyframes wfAnim {
    0%,100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
  @keyframes shieldFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes scanLine {
    from { transform: translateY(-100%); }
    to   { transform: translateY(400%); }
  }
  @keyframes countdownBar {
    from { width: 100%; }
    to   { width: 0%; }
  }
  @keyframes personaFade {
    0% { opacity:0; transform: translateX(8px); }
    15% { opacity:1; transform: translateX(0); }
    80% { opacity:1; }
    100% { opacity:0; }
  }
  @keyframes vruBreathe {
    0%,100% { opacity:0.7; transform:scale(1); }
    50% { opacity:1; transform:scale(1.1); }
  }
  @keyframes nightGlare {
    0%,100% { opacity:0.6; }
    50% { opacity:1; }
  }
  @keyframes rippleOut {
    0% { transform:translate(-50%,-50%) scale(1); opacity:0.5; }
    100% { transform:translate(-50%,-50%) scale(2.5); opacity:0; }
  }

  /* ══ VOICE TOAST ══ */
  #voice-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(8,10,22,0.96);
    border: 1px solid rgba(26,237,138,0.4);
    border-radius: 12px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(26,237,138,0.15);
    min-width: 280px;
    max-width: 480px;
  }
  #voice-toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  #voice-toast .wf-container {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  #voice-toast .wf-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--green);
    animation: wfAnim 0.45s ease-in-out infinite;
  }
  #voice-toast .toast-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  #voice-toast .toast-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.88);
    line-height: 1.4;
    font-style: italic;
  }
  #voice-speaker-btn {
    position: fixed;
    top: 52px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: all 0.2s;
  }
  #voice-speaker-btn.muted { color: rgba(255,79,79,0.7); border-color: rgba(255,79,79,0.3); }
  #voice-speaker-btn:hover { background: rgba(255,255,255,0.1); }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// UI UDP — Screen Device Components
// Exports: HUDScreen, CentralScreen, RearScreen, PhoneScreen, PrivacyScreen, GlareScreen

const { useState, useEffect, useRef } = React;

/* ─── Map SVG ─────────────────────────────────────────── */
function DarkMap({ showRoute = true, nightMode = false }) {
  const bg = nightMode ? '#03080f' : '#08101e';
  return (
    <svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg"
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
      <rect width="480" height="300" fill={bg} />
      <rect width="480" height="300" fill="url(#gridPat)" opacity="0.4" />
      <defs>
        <pattern id="gridPat" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.035)" strokeWidth="0.5"/>
        </pattern>
      </defs>
      {/* city grid */}
      {[...Array(9)].map((_,i) => <line key={`h${i}`} x1="0" y1={i*36} x2="480" y2={i*36} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>)}
      {[...Array(14)].map((_,i) => <line key={`v${i}`} x1={i*36} y1="0" x2={i*36} y2="300" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>)}
      {/* main roads */}
      <line x1="0" y1="155" x2="480" y2="155" stroke="rgba(255,255,255,0.1)" strokeWidth="2"/>
      <line x1="240" y1="0" x2="240" y2="300" stroke="rgba(255,255,255,0.1)" strokeWidth="2"/>
      <line x1="0" y1="80" x2="480" y2="200" stroke="rgba(255,255,255,0.07)" strokeWidth="1.5"/>
      <line x1="60" y1="0" x2="60" y2="300" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
      <line x1="390" y1="0" x2="390" y2="300" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
      {/* route */}
      {showRoute && (
        <>
          <path d="M 50 155 Q 80 155 120 130 L 200 120 Q 260 115 310 130 L 420 150"
            stroke="#4080ff" strokeWidth="3.5" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
          <path d="M 50 155 Q 80 155 120 130 L 200 120 Q 260 115 310 130 L 420 150"
            stroke="rgba(64,128,255,0.2)" strokeWidth="10" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </>
      )}
      {/* position dot */}
      <circle cx="200" cy="120" r="7" fill="#4080ff"/>
      <circle cx="200" cy="120" r="12" fill="rgba(64,128,255,0.25)"/>
      {/* dest marker */}
      {showRoute && (
        <>
          <circle cx="420" cy="150" r="5" fill="#1aed8a"/>
          <circle cx="420" cy="150" r="9" fill="rgba(26,237,138,0.2)"/>
        </>
      )}
      {/* night overlay */}
      {nightMode && <rect width="480" height="300" fill="rgba(0,10,30,0.35)"/>}
    </svg>
  );
}

/* ─── Night Road Scene (HUD backdrop) ────────────────── */
function RoadScene({ alertLevel, children }) {
  const skyTint = alertLevel === 'emergency' ? 'rgba(80,0,0,0.4)'
    : alertLevel === 'checkin' || alertLevel === 'warning' ? 'rgba(60,35,0,0.3)'
    : 'rgba(0,0,0,0)';
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, #030608 0%, #080f1c 55%, #0d1528 100%)' }}/>
      <div style={{ position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px)',pointerEvents:'none',zIndex:1 }}/>
      <div style={{ position: 'absolute', inset: 0, background: skyTint, transition: 'background 0.8s' }}/>
      {/* road surface */}
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '45%', background: 'linear-gradient(to bottom, #0d1018, #121820)', clipPath: 'polygon(28% 0%, 72% 0%, 100% 100%, 0% 100%)' }}/>
      {/* lane dashes */}
      {[0, 20, 40, 60, 80].map((y, i) => (
        <div key={i} style={{ position: 'absolute', bottom: `${y/4}%`, left: '49.2%', width: '1.6px', height: '7px', background: `rgba(255,255,255,${0.35 - i*0.05})`, transform: `scaleY(${1 - i*0.08})` }}/>
      ))}
      {/* oncoming lights */}
      <div style={{ position: 'absolute', top: '32%', left: '47%', width: '3px', height: '3px', borderRadius: '50%', background: 'rgba(255,240,200,0.9)', boxShadow: '0 0 10px 4px rgba(255,240,200,0.35)' }}/>
      <div style={{ position: 'absolute', top: '32%', left: '53%', width: '3px', height: '3px', borderRadius: '50%', background: 'rgba(255,240,200,0.9)', boxShadow: '0 0 10px 4px rgba(255,240,200,0.35)' }}/>
      {/* streetlights */}
      <div style={{ position: 'absolute', top: '20%', left: '20%', width: '1px', height: '20%', background: 'rgba(255,200,100,0.2)' }}/>
      <div style={{ position: 'absolute', top: '20%', right: '20%', width: '1px', height: '20%', background: 'rgba(255,200,100,0.2)' }}/>
      {children}
    </div>
  );
}

/* ─── Timer Bar ───────────────────────────────────────── */
function TimerBar({ duration = 8, color = '#1aed8a', auto = true }) {
  const [pct, setPct] = useState(100);
  useEffect(() => {
    if (!auto) return;
    const iv = setInterval(() => setPct(p => Math.max(0, p - 100 / (duration * 10))), 100);
    return () => clearInterval(iv);
  }, [duration, auto]);
  return (
    <div style={{ height: '2px', borderRadius: '2px', background: 'rgba(255,255,255,0.08)', overflow: 'hidden', marginTop: '5px' }}>
      <div style={{ height: '100%', width: `${pct}%`, background: color, transition: 'width 0.1s linear', borderRadius: '2px', boxShadow: `0 0 6px ${color}` }}/>
    </div>
  );
}

/* ─── Waveform ────────────────────────────────────────── */
function WaveformViz({ color = '#4080ff', barCount = 22 }) {
  const [bars, setBars] = useState(() => Array(barCount).fill(0).map(() => Math.random() * 28 + 4));
  useEffect(() => {
    const iv = setInterval(() => setBars(Array(barCount).fill(0).map((_, i) => {
      const mid = Math.abs(i - barCount / 2) / (barCount / 2);
      return (Math.random() * 36 + 4) * (1 - mid * 0.5);
    })), 130);
    return () => clearInterval(iv);
  }, []);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '2px', height: '50px' }}>
      {bars.map((h, i) => (
        <div key={i} style={{ width: '4px', height: `${h}px`, borderRadius: '2px', background: color, opacity: 0.7 + Math.random() * 0.3, transition: 'height 0.13s ease' }}/>
      ))}
    </div>
  );
}

/* ─── Pulse dot ───────────────────────────────────────── */
function PulseDot({ color = '#1aed8a', size = 8 }) {
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <div style={{ width: size, height: size, borderRadius: '50%', background: color, position: 'absolute' }}/>
      <div style={{ width: size * 2.5, height: size * 2.5, borderRadius: '50%', border: `1.5px solid ${color}`, position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', opacity: 0.4, animation: 'ripple 1.8s ease-out infinite' }}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   HUD SCREEN
═══════════════════════════════════════════════════════ */
function HUDScreen({ screen }) {
  const alertLevel = screen.alertLevel;
  // Auto-announce critical states via voice
  React.useEffect(() => {
    if(!window.VOICE) return;
    const voiceMap = {
      'emergency': 'Help notified. Stay calm. Location shared.',
      'checkin': 'Still okay? Press left button to confirm.',
      'safety-active': 'Safety net active. Your contact has been notified.',
      'warning': screen.rightText && screen.rightText.includes('Pedestrian') ? 'Pedestrian crossing. Slow down.' : '',
      'presence': 'Car behind. Light is green. Move forward.',
    };
    const txt = voiceMap[alertLevel] || '';
    if(txt) setTimeout(() => window.VOICE.speak(txt, alertLevel==='emergency'?'#ff4f4f':alertLevel==='checkin'?'#f5a62a':'#1aed8a'), 500);
  }, [alertLevel, screen.title]);
  const hudBorderColor =
    alertLevel === 'emergency'     ? 'rgba(255,69,69,0.9)'   :
    alertLevel === 'warning'       ? 'rgba(245,166,35,0.75)' :
    alertLevel === 'checkin'       ? 'rgba(245,166,35,0.6)'  :
    alertLevel === 'orange'        ? 'rgba(255,140,0,0.7)'   :
    alertLevel === 'silent'        ? 'rgba(255,100,100,0.45)':
    alertLevel === 'fatigue-mid'   ? 'rgba(245,166,35,0.6)'  :
    alertLevel === 'fatigue-subtle'? 'rgba(245,166,35,0.25)' :
    'rgba(26,237,138,0.3)';

  const centerColor =
    alertLevel === 'emergency' ? '#ff6666' :
    alertLevel === 'checkin' || alertLevel === 'warning' || alertLevel?.startsWith('fatigue') ? '#ffb84d' :
    'rgba(255,255,255,0.92)';

  const rightColor =
    alertLevel === 'emergency' ? '#ff4545' :
    alertLevel === 'orange' ? '#ff8c00' :
    alertLevel === 'warning' ? '#ffb84d' :
    alertLevel === 'silent' ? '#ff7070' :
    alertLevel === 'safety-active' ? '#1aed8a' :
    alertLevel === 'call' ? '#1aed8a' :
    '#1aed8a';

  return (
    <div style={{ width: '100%', borderRadius: '12px', overflow: 'hidden', position: 'relative' }}>
      {/* Road backdrop */}
      <div style={{ height: 140, position: 'relative' }}>
        <RoadScene alertLevel={alertLevel}>
          {screen.personaLabel && (
            <div style={{
              position: 'absolute', top: '36%', left: '54%',
              background: 'rgba(10,14,32,0.88)', backdropFilter: 'blur(10px)',
              border: '1px solid rgba(157,111,255,0.5)', borderRadius: '5px',
              padding: '4px 10px', fontFamily: 'Space Grotesk',
              fontSize: '11px', fontWeight: '600', color: 'rgba(200,180,255,0.92)', letterSpacing: '0.3px',
              animation: 'personaFade 6s ease forwards',
              boxShadow: '0 2px 12px rgba(157,111,255,0.25)',
            }}>
              <span style={{ fontSize:10, marginRight:4 }}>🛵</span>
              {screen.personaLabel}
            </div>
          )}
          {/* Pedestrian silhouette for VRU */}
          {alertLevel === 'silent' && (
            <div style={{ position: 'absolute', top: '26%', left: '48%', fontSize: '22px', opacity: 0.55, filter: 'saturate(0) brightness(1.2)', border:'1px solid rgba(255,220,50,0.4)', borderRadius:'4px', padding:'2px 4px' }}>🚶</div>
          )}
          {alertLevel === 'warning' && (
            <div style={{ position: 'absolute', top: '24%', left: '47%', fontSize: '28px', opacity: 0.9, animation: 'vruBreathe 1s ease-in-out infinite', filter:'drop-shadow(0 0 8px rgba(255,79,79,0.8))' }}>🚶</div>
          )}
          {alertLevel === 'orange' && (
            <div style={{ position: 'absolute', top: '38%', left: '47%', fontSize: '20px', opacity: 0.7 }}>🐕</div>
          )}
          {/* Safety net active - green shield glow */}
          {alertLevel === 'safety-active' && (
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 100%, rgba(26,237,138,0.08) 0%, transparent 70%)' }}/>
          )}
          {/* Emergency red ambient */}
          {alertLevel === 'emergency' && (
            <div style={{ position: 'absolute', inset: 0, background: 'rgba(255,0,0,0.08)', animation: 'flashRed 2s ease-in-out infinite' }}/>
          )}
          {/* Checkin amber glow */}
          {alertLevel === 'checkin' && (
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 80%, rgba(245,166,35,0.15) 0%, transparent 60%)' }}/>
          )}
        </RoadScene>
      </div>

      {/* HUD band */}
      <div style={{
        background: 'rgba(4,5,13,0.93)', backdropFilter: 'blur(22px)',
        borderTop: `2px solid ${hudBorderColor}`,
        border: `1px solid ${hudBorderColor.replace('0.9','0.5').replace('0.75','0.4')}`,
        borderTop: `2px solid ${hudBorderColor}`,
        padding: '11px 18px 13px',
        display: 'grid', gridTemplateColumns: '90px 1fr 130px',
        alignItems: 'center', gap: '8px', minHeight: '76px',
        boxShadow: `0 -8px 36px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04)`,
      }}>
        {/* Speed */}
        <div>
          <div style={{ fontFamily: 'Space Mono', fontSize: '30px', fontWeight: '700', color: 'rgba(255,255,255,0.95)', lineHeight: 1, letterSpacing: '-1px' }}>
            {screen.speed ?? '—'}
          </div>
          <div style={{ fontFamily: 'Space Grotesk', fontSize: '9px', color: 'rgba(255,255,255,0.35)', letterSpacing: '1.8px', textTransform: 'uppercase', marginTop: '2px' }}>km/h</div>
        </div>

        {/* Center */}
        <div style={{ textAlign: 'center', borderLeft: '1px solid rgba(255,255,255,0.07)', borderRight: '1px solid rgba(255,255,255,0.07)', padding: '0 10px' }}>
          <div style={{ fontFamily: 'Space Grotesk', fontSize: '13px', fontWeight: '500', color: centerColor, lineHeight: 1.35, transition: 'color 0.4s' }}>
            {screen.centerLine1}
          </div>
          {screen.centerLine2 && (
            <div style={{ fontFamily: 'DM Sans', fontSize: '10px', color: 'rgba(255,255,255,0.42)', marginTop: '3px' }}>
              {screen.centerLine2}
            </div>
          )}
          {screen.modePrompt && (

const DEVICE_LABELS = { hud:'HUD', central:'Central Display', rear:'Rear Screen', phone:'Companion App', privacy:'Privacy Glass', glare:'Windshield View' };
const DEVICE_ICONS  = { hud:'◈', central:'▬', rear:'⊞', phone:'⊏', privacy:'◧', glare:'◻' };

function DeviceChrome({ deviceType }) {
  const label = DEVICE_LABELS[deviceType] || deviceType;
  const icon  = DEVICE_ICONS[deviceType] || '○';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'10px' }} className="device-label">
      <span style={{ fontFamily:'Space Grotesk', fontSize:'10px', color:'rgba(255,255,255,0.3)', letterSpacing:'1.5px', textTransform:'uppercase' }}>{icon} {label}</span>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   FEATURE VIEW
════════════════════════════════════════════════════════ */
function FeatureView({ feature }) {
  const [si, setSi] = useState(0);
  const screen = feature.screens[si];
  const total = feature.screens.length;
  const key = `${feature.id}-${si}`;

  // Reset screen index when feature changes
  useEffect(() => { setSi(0); }, [feature.id]);

  const renderDevice = () => {
    switch(screen.device) {
      case 'hud':     return <HUDScreen screen={screen}/>;
      case 'central': return <CentralScreen screen={screen}/>;
      case 'rear':    return <RearScreen screen={screen}/>;
      case 'phone':   return <PhoneScreen screen={screen}/>;
      case 'privacy': return <PrivacyScreen/>;
      case 'glare':   return <GlareScreen/>;
      default:        return null;
    }
  };

  // Speak voice when screen changes
  React.useEffect(() => {
    if(window.VOICE) {
      const key = `${feature.id}-${si}`;
      const text = window.VOICE.VOICE_MAP[key];
      const colors = { F9:'#ff4f4f', F10:'#9d6fff', F11:'#1aed8a', F13:'#f5a62a', F1:'#4f8fff', F5:'#9d6fff' };
      const fid = feature.id;
      if(text) {
        setTimeout(() => window.VOICE.speak(text, colors[fid] || '#1aed8a'), 350);
      } else if(window.VOICE) {
        window.VOICE.hideToast();
      }
    }
  }, [feature.id, si]);

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Feature header */}
      <div data-voice-key={`${feature.id}-${si}`} style={{ padding:'14px 24px 12px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:'12px', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', flex:1 }}>
          <div style={{ fontFamily:'Space Mono', fontSize:'11px', color:'var(--text3)' }}>F{feature.num || feature.id.replace('F','')}</div>
          <div style={{ width:1, height:16, background:'var(--border2)' }}/>
          <div style={{ fontFamily:'Space Grotesk', fontWeight:'600', fontSize:'14px', color:'var(--text1)' }}>{feature.name}</div>
          <span style={{ fontFamily:'Space Grotesk', fontSize:'9px', padding:'2px 8px', borderRadius:'12px', background: feature.catColor+'22', border:`1px solid ${feature.catColor}44`, color:feature.catColor, letterSpacing:'0.5px' }}>{feature.category}</span>
        </div>
        {/* Screen counter */}
        <div style={{ fontFamily:'Space Mono', fontSize:'10px', color:'var(--text3)' }}>{si+1} / {total}</div>
      </div>

      {/* Main area */}
      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
        {/* Device area */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px 24px', overflowY:'auto', gap:'0' }}>
          <DeviceChrome deviceType={screen.device}/>
          <div key={key} className="screen-area" style={{ width:'100%', maxWidth: screen.device==='phone'?260 : screen.device==='rear'?380 : screen.device==='hud'?720 : 620 }}>
            {renderDevice()}
          </div>
          {/* Screen nav dots */}
          <div style={{ display:'flex', alignItems:'center', gap:'10px', marginTop:'18px' }}>
            <button className="nav-btn" onClick={() => setSi(i=>i-1)} disabled={si===0}
              style={{ width:28, height:28, borderRadius:'50%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', fontSize:'12px', cursor:'pointer' }}>‹</button>
            <div style={{ display:'flex', gap:'7px', alignItems:'center' }}>
              {feature.screens.map((s,i) => (
                <div key={i} className="screen-dot" onClick={() => setSi(i)}
                  style={{ width: i===si?22:8, height:8, borderRadius:'4px', background: i===si?feature.catColor:'rgba(255,255,255,0.15)', transition:'all 0.25s', cursor:'pointer' }}/>
              ))}
            </div>
            <button className="nav-btn" onClick={() => setSi(i=>i+1)} disabled={si===total-1}
              style={{ width:28, height:28, borderRadius:'50%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', fontSize:'12px', cursor:'pointer' }}>›</button>
          </div>
        </div>

        {/* Description panel */}
        <div style={{ width:260, flexShrink:0, borderLeft:'1px solid var(--border)', padding:'20px 18px', display:'flex', flexDirection:'column', gap:'14px', overflowY:'auto', background:'rgba(255,255,255,0.01)' }}>
          {/* Screen info */}
          <div key={key} style={{ animation:'slideUp 0.3s ease' }}>
            <div style={{ fontFamily:'Space Grotesk', fontSize:'9px', color:'var(--text3)', letterSpacing:'1.2px', textTransform:'uppercase', marginBottom:'7px' }}>Screen {si+1} of {total}</div>
            <div style={{ fontFamily:'Space Grotesk', fontWeight:'600', fontSize:'12px', color:'var(--text1)', lineHeight:1.45, marginBottom:'9px' }}>{screen.title}</div>
            <div style={{ fontFamily:'DM Sans', fontSize:'11px', color:'var(--text2)', lineHeight:1.65 }}>{screen.desc}</div>
          </div>

          {/* All screens in feature */}
          <div>
            <div style={{ fontFamily:'Space Grotesk', fontSize:'9px', color:'var(--text3)', letterSpacing:'1.2px', textTransform:'uppercase', marginBottom:'7px' }}>Flow</div>
            {feature.screens.map((s, i) => (
              <div key={i} onClick={() => setSi(i)} style={{ display:'flex', alignItems:'flex-start', gap:'8px', padding:'7px 8px', borderRadius:'5px', marginBottom:'2px', cursor:'pointer', background: i===si?'rgba(255,255,255,0.05)':'transparent', border: i===si?'1px solid rgba(255,255,255,0.08)':'1px solid transparent', transition:'background 0.15s' }}>
                <div style={{ width:16, height:16, borderRadius:'50%', border:`1.5px solid ${i===si?feature.catColor:'rgba(255,255,255,0.2)'}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1, background: i===si?feature.catColor+'22':'transparent' }}>
                  <span style={{ fontFamily:'Space Mono', fontSize:'7px', color: i===si?feature.catColor:'var(--text3)' }}>{i+1}</span>
                </div>
                <div>
                  <div style={{ fontFamily:'Space Grotesk', fontSize:'9px', color: i===si?'rgba(255,255,255,0.85)':'var(--text3)', lineHeight:1.4 }}>{s.title}</div>
                  <div style={{ fontFamily:'DM Sans', fontSize:'8px', color:'rgba(255,255,255,0.22)', marginTop:'2px' }}>{DEVICE_LABELS[s.device]}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Device info */}
          <div style={{ marginTop:'auto', padding:'10px', background:'rgba(255,255,255,0.02)', borderRadius:'6px', border:'1px solid var(--border)' }}>
            <div style={{ fontFamily:'Space Grotesk', fontSize:'8px', color:'var(--text3)', letterSpacing:'1.2px', textTransform:'uppercase', marginBottom:'5px' }}>Surface</div>
            <div style={{ fontFamily:'Space Grotesk', fontSize:'10px', color:'var(--text2)' }}>{DEVICE_ICONS[screen.device]} {DEVICE_LABELS[screen.device]}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════

════════════════════════════════════════════════════════ */
function App() {
  const [selectedId, setSelectedId] = useState(null);
  const selectedFeature = FEATURES.find(f => f.id === selectedId);

  const handleKeyDown = useCallback((e) => {
    if (!selectedFeature) return;
    // allow feature traversal with arrow up/down
    if (e.key === 'Escape') setSelectedId(null);
  }, [selectedFeature]);

  useEffect(() => {
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [handleKeyDown]);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Top bar */}
      <div style={{ height:42, flexShrink:0, display:'flex', alignItems:'center', padding:'0 18px', borderBottom:'1px solid rgba(255,255,255,0.07)', background:'rgba(3,4,10,0.97)', backdropFilter:'blur(24px)', gap:'12px', zIndex:10, boxShadow:'0 1px 0 rgba(255,255,255,0.04)' }}>
        <div style={{ fontFamily:'Space Grotesk', fontWeight:'700', fontSize:'11px', color:'rgba(255,255,255,0.5)', letterSpacing:'2px', textTransform:'uppercase' }}>UI UDP</div>
        <div style={{ width:1, height:14, background:'var(--border2)' }}/>
        <div style={{ fontFamily:'DM Sans', fontSize:'10px', color:'var(--text3)' }}>Unified Driver Platform — Interface Prototype</div>
        {selectedId && (
          <button onClick={() => setSelectedId(null)} style={{ marginLeft:'auto', fontFamily:'Space Grotesk', fontSize:'9px', color:'var(--text3)', background:'transparent', border:'1px solid var(--border2)', borderRadius:'4px', padding:'3px 9px', cursor:'pointer', letterSpacing:'0.5px' }}>
            ← All Features
          </button>
        )}
        {/* Surface key */}
        <div style={{ display:'flex', gap:'10px', marginLeft: selectedId?'8px':'auto' }}>
          {[['◈','HUD','#4080ff'],['▬','Central','#1aed8a'],['⊞','Rear','#ffd166'],['⊏','App','#f5a623'],['◧','Glass','#9d6fff']].map(([ic,lb,col]) => (
            <div key={lb} style={{ display:'flex', alignItems:'center', gap:'3px' }}>
              <span style={{ fontFamily:'Space Mono', fontSize:'8px', color: col+'bb' }}>{ic}</span>

        </div>

// Replace the original App rendering with our enhanced App2
// The original App renders via ReactDOM.createRoot — we need to intercept
// Since original uses createRoot(document.getElementById('root')).render(<App/>)
// we'll override after it loads

// Wait a tick for the original to mount, then replace
setTimeout(() => {
  try {
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App2));
  } catch(e) {
    // If already mounted, unmount first
    const root = document.getElementById('root');
    root.innerHTML = '';
    ReactDOM.createRoot(root).render(React.createElement(App2));
  }
}, 50);

    'F8-1': 'Shahu Boarding. Vegetarian. On route. 25 minutes.',
    'F8-2': '',
    // F9 VRU
    'F9-0': '',
    'F9-1': 'Pedestrian crossing. Slow down.',
    'F9-2': 'Animal detected at 80 metres. Lower urgency.',
    // F10 Glare
    'F10-0': '',
    'F10-1': '',
    'F10-2': 'Glare management paused. 30 seconds. Resuming automatically.',
    // F11 Safety
    'F11-0': 'Safety net active. Amma has been notified.',
    'F11-1': '',
    'F11-2': 'Still okay? Press left button to confirm.',
    'F11-3': 'Help notified. Stay calm. Location shared.',
    'F11-4': '',
    // F12 Privacy
    'F12-0': '',
    'F12-1': '',
    'F12-2': '',
    // F13 Fatigue
    'F13-0': 'Take a breath.',
    'F13-1': 'Break in 8 kilometres. Coffee ahead. Yes or not yet.',
    'F13-2': '',
  };

  function makeWaveform(container, color) {
    container.innerHTML = '';
    var heights = [0.4, 0.7, 1, 0.8, 0.6, 0.9, 0.7, 0.5, 0.8, 1, 0.6];
    heights.forEach(function(h, i) {
      var bar = document.createElement('div');
      bar.className = 'wf-bar';
      bar.style.height = (h * 18) + 'px';
      bar.style.background = color || '#1aed8a';
      bar.style.animationDuration = (0.35 + Math.random() * 0.3) + 's';
      bar.style.animationDelay = (i * 0.07) + 's';
      container.appendChild(bar);
    });
  }

  function showToast(text, color) {
    var toast = document.getElementById('voice-toast');
    var textEl = document.getElementById('voice-text');
    var wfEl = document.getElementById('voice-wf');
    if (!toast || !textEl) return;
    
    textEl.textContent = '"' + text + '"';
    toast.style.borderColor = (color || 'rgba(26,237,138,0.4)');
    makeWaveform(wfEl, color || '#1aed8a');
    toast.classList.add('visible');
    
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove('visible');
    }, Math.max(3500, text.length * 65));
  }

  function hideToast() {
    var toast = document.getElementById('voice-toast');
    if (toast) toast.classList.remove('visible');
    if (toastTimer) clearTimeout(toastTimer);
  }

  function speak(text, color) {
    if (!text || text.trim() === '') return;
    
    // Always show toast
    showToast(text, color);
    
    if (muted || !synth) return;
    
    // Cancel any ongoing speech
    synth.cancel();
    
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.88;
    utter.pitch = 0.95;
    utter.volume = 0.9;
    
    // Try to get a good voice
    var voices = synth.getVoices();
    var preferred = voices.find(function(v) {
      return v.lang === 'en-IN' || v.name.includes('Google') && v.lang.startsWith('en');
    }) || voices.find(function(v) { return v.lang.startsWith('en'); });
    if (preferred) utter.voice = preferred;
    
    utter.onend = function() { currentUtterance = null; };
    currentUtterance = utter;
    synth.speak(utter);
  }

  // Toggle mute button
  var muteBtn = document.getElementById('voice-speaker-btn');
  if (muteBtn) {
    muteBtn.addEventListener('click', function() {
      muted = !muted;
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.className = muted ? 'muted' : '';
      if (muted && synth) synth.cancel();
    });
  }

  // Load voices async
  if (synth && synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = function() { synth.getVoices(); };
  }

  // Expose globally so React can call it
  window.VOICE = { speak: speak, VOICE_MAP: VOICE_MAP, hideToast: hideToast };
  
})();
</script>

<script type="text/babel">
// ── Voice integration patch ──────────────────────────────────
const { useEffect: useVoiceEffect } = React;

// Monkey-patch FeatureView to emit voice on screen change
const _OriginalFeatureView = FeatureView;

// We patch via a global observer on screen index changes
// by intercepting screen navigation clicks
(function patchVoice() {
  // Auto-speak when feature/screen loads - use MutationObserver to detect changes
  var lastKey = '';
  
  function checkAndSpeak() {
    // Look for active feature from DOM markers
    var titleEl = document.querySelector('[data-voice-key]');
    if (titleEl) {
      var key = titleEl.getAttribute('data-voice-key');
      if (key !== lastKey) {
        lastKey = key;
        if (window.VOICE && window.VOICE.VOICE_MAP[key]) {
          var colors = { F9:'#ff4f4f', F10:'#ff4f4f', F11:'#ff4f4f', F13:'#f5a62a' };
          var fid = key.split('-')[0];
          window.VOICE.speak(window.VOICE.VOICE_MAP[key], colors[fid] || '#1aed8a');
        }
      }
    }
  }
  
  setInterval(checkAndSpeak, 300);
})();
</script>
